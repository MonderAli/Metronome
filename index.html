<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aguafina+Script&display=swap" rel="stylesheet">
    <link rel="icon" href="background.png">
    <meta name="description" content="A simple online metronome with adjustable BPM and time signature. Accent the first beat and change tempo presets. by Monder Ali">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#45986e">
    <!-- iOS / Apple tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Online Metronome">
    <link rel="apple-touch-icon" href="appIcon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="appIcon.png">
    <link rel="stylesheet" href="style.css">
    <title>Online Metronome </title>
</head>
<body>
    <h1>Online Metronome by Monder Ali</h1>
    
    <div id="controls">
        <br>
        <button id="start">Start</button>

        <div class="bpm-row">
            <label for="bpm">BPM:</label>
            <input type="number" id="bpm" value="120">
            <label for="tempoPreset">Tempo:</label>
            <select id="tempoPreset">
                <option value="">— Preset —</option>
                <option value="40">Largo (40)</option>
                <option value="56">Larghetto (56)</option>
                <option value="70">Adagio (70)</option>
                <option value="88">Andante (88)</option>
                <option value="110">Moderato (110)</option>
                <option value="132">Allegro (132)</option>
                <option value="170">Vivace (170)</option>
                <option value="190">Presto (190)</option>
            </select>
        </div>

        <div class="timesig-row">
            <label for="numerator">Time Signature</label>
            <input id="numerator" type="number" value="2">
            <p>/</p>
            <select id="denominator">
                <option value="2">2</option>
                <option value="4">4</option>
                <option value="8">8</option>
                <option value="16">16</option>
            </select>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
